<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard | Threat Detection</title>
    <link rel="stylesheet" href="../static/style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ PhishGuard</h1>
            <p>Neural Network Phishing Detection System</p>
        </header>

        <main>
            <div class="input-card">
                <label for="urlInput">Enter Website URL to Scan:</label>
                <input type="url" id="urlInput" placeholder="https://www.example.com" class="url-bar">
                <button id="analyzeBtn" onclick="analyzeWebsite()">Analyze Threat</button>
            </div>

            <div class="result-card" id="resultCard" style="display: none;">
                <h2>Scan Results</h2>
                <div class="verdict-box" id="verdictBox">
                    <span id="verdictText">Processing...</span>
                </div>
                <div class="metrics">
                    <p>Confidence Score: <strong id="confidenceScore">--</strong></p>
                </div>
            </div>
        </main>
    </div>

    <script src="../static/script/script.js"></script>
</body>
</html>
